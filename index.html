<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Organizational Efficiency Assessment — GSD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:         #0D1B2A;
    --cobalt:       #1B5EA8;
    --cobalt-dark:  #154D8E;
    --cobalt-light: #2470C4;
    --gold:         #F5A623;
    --gold-light:   #F7B84B;
    --logo-red:     #D63B2F;
    --text-on-navy: #E8EEF5;
    --text-muted-navy: #7A96B4;
    --red: #DC2626;
    --green: #16A34A;
    --border: rgba(255,255,255,0.07);
    --card-bg: rgba(255,255,255,0.04);
    --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    min-height: 100vh;
    background: var(--navy);
    color: var(--text-on-navy);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .shell {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── Header ── */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0 20px;
    background: var(--cobalt);
    border-bottom: 3px solid var(--gold);
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .logo span { color: var(--gold); }

  .header-tag {
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
    background: rgba(245,166,35,0.15);
    border: 1px solid rgba(245,166,35,0.35);
    padding: 5px 12px;
    border-radius: 100px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    margin-bottom: 40px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--text-muted-navy);
  }

  .progress-meta strong { color: var(--text-on-navy); font-weight: 500; }

  .progress-track {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--cobalt);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .step-dots {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    transition: var(--transition);
  }

  .step-dot.done { background: var(--cobalt); }
  .step-dot.active { background: var(--gold); width: 20px; border-radius: 3px; }

  /* ── Section heading ── */
  .section-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .section-title {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    line-height: 1.2;
    color: #fff;
    margin-bottom: 10px;
  }

  .section-sub {
    color: var(--text-muted-navy);
    font-size: 15px;
    margin-bottom: 36px;
    max-width: 560px;
  }

  /* ── Form elements ── */
  .field-group {
    margin-bottom: 20px;
  }

  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted-navy);
    margin-bottom: 8px;
    letter-spacing: 0.01em;
  }

  .field-label .req { color: var(--gold); margin-left: 3px; }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color var(--transition), background var(--transition);
    -webkit-appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: rgba(27,94,168,0.7);
    background: rgba(255,255,255,0.06);
  }

  input::placeholder, textarea::placeholder { color: rgba(139,160,184,0.6); }

  select option { background: #0D1B2A; color: #fff; }

  textarea { resize: vertical; min-height: 90px; }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 560px) { .two-col { grid-template-columns: 1fr; } }

  /* ── Choice cards (radio/checkbox) ── */
  .choice-grid {
    display: grid;
    gap: 10px;
  }

  .choice-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .choice-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

  @media (max-width: 560px) {
    .choice-grid.cols-2, .choice-grid.cols-3 { grid-template-columns: 1fr; }
  }

  .choice-card {
    position: relative;
    cursor: pointer;
  }

  .choice-card input { position: absolute; opacity: 0; width: 0; height: 0; }

  .choice-card-inner {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color var(--transition), background var(--transition);
    cursor: pointer;
    user-select: none;
  }

  .choice-card input:checked + .choice-card-inner {
    border-color: rgba(27,94,168,0.65);
    background: rgba(27,94,168,0.1);
  }

  .choice-card-inner:hover {
    border-color: rgba(27,94,168,0.35);
    background: rgba(255,255,255,0.05);
  }

  .choice-marker {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
    margin-top: 1px;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .choice-card.checkbox .choice-marker { border-radius: 5px; }

  .choice-card input:checked + .choice-card-inner .choice-marker {
    background: var(--cobalt);
    border-color: var(--cobalt);
  }

  .choice-marker-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    opacity: 0;
    transition: var(--transition);
  }

  .choice-card.checkbox input:checked + .choice-card-inner .choice-marker-dot {
    opacity: 1;
    border-radius: 2px;
    width: 9px;
    height: 7px;
    background: none;
    border-bottom: 2px solid #fff;
    border-right: 2px solid #fff;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .choice-card input:not(.checkbox-input):checked + .choice-card-inner .choice-marker-dot { opacity: 1; }

  .choice-text { flex: 1; }
  .choice-title { font-size: 14px; font-weight: 500; color: #fff; line-height: 1.3; }
  .choice-desc { font-size: 12px; color: var(--text-muted-navy); margin-top: 2px; line-height: 1.4; }

  /* ── Range slider ── */
  .range-wrap {
    padding: 4px 0;
  }

  input[type="range"] {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    border: none;
    -webkit-appearance: none;
    outline: none;
    padding: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--cobalt);
    cursor: pointer;
    border: 3px solid var(--navy);
    box-shadow: 0 0 0 1px var(--cobalt);
  }

  .range-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted-navy);
  }

  .range-value {
    text-align: center;
    font-size: 22px;
    font-weight: 500;
    color: var(--cobalt-light);
    margin-bottom: 8px;
  }

  /* ── Divider ── */
  .form-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  .field-section-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-on-navy);
    letter-spacing: 0.02em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .field-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Navigation buttons ── */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 36px;
    gap: 12px;
  }

  .btn-back {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted-navy);
    padding: 12px 22px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
  }

  .btn-back:hover { border-color: rgba(255,255,255,0.2); color: #fff; }

  .btn-next {
    background: var(--cobalt);
    border: none;
    color: #fff;
    padding: 13px 28px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .btn-next:hover { background: var(--cobalt-dark); }
  .btn-next:active { transform: scale(0.98); }

  .btn-gold {
    background: var(--gold);
    border: none;
    color: var(--navy);
    padding: 13px 28px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .btn-gold:hover { background: var(--gold-light); }
  .btn-gold:active { transform: scale(0.98); }

  .btn-next svg, .btn-back svg { width: 15px; height: 15px; }

  /* ── Teaser / gate screen ── */
  .teaser-screen { text-align: center; padding: 20px 0; }

  .score-ring-wrap {
    display: flex;
    justify-content: center;
    margin: 32px 0 28px;
    position: relative;
  }

  .score-ring-wrap svg { width: 160px; height: 160px; }

  .score-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .score-number {
    font-family: 'Instrument Serif', serif;
    font-size: 44px;
    color: #fff;
    line-height: 1;
  }

  .score-label {
    font-size: 11px;
    color: var(--text-muted-navy);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  .score-tier {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    padding: 7px 18px;
    border-radius: 100px;
    margin: 0 0 28px;
  }

  .tier-dot { width: 8px; height: 8px; border-radius: 50%; }

  .teaser-insights {
    display: grid;
    gap: 10px;
    margin: 28px 0 36px;
    text-align: left;
  }

  .insight-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .insight-icon {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .insight-text { font-size: 14px; color: var(--text-muted-navy); line-height: 1.5; }
  .insight-text strong { color: var(--text-on-navy); display: block; margin-bottom: 2px; font-size: 14px; font-weight: 500; }

  .blurred-preview {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    filter: blur(5px);
    pointer-events: none;
    user-select: none;
    opacity: 0.5;
    position: relative;
  }

  .gate-label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted-navy);
    text-align: center;
    margin-bottom: 20px;
  }

  /* ── Gate / contact form ── */
  .gate-screen {
    background: rgba(27,94,168,0.07);
    border: 1px solid rgba(27,94,168,0.25);
    border-radius: 14px;
    padding: 32px;
    margin-top: 8px;
  }

  .gate-screen .section-title { font-size: 26px; }

  /* ── Final / thank you ── */
  .final-screen { text-align: center; padding: 24px 0; }

  .checkmark-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(22,163,74,0.15);
    border: 2px solid rgba(22,163,74,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px;
  }

  .full-report-preview {
    display: grid;
    gap: 10px;
    margin: 28px 0;
    text-align: left;
  }

  .report-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    color: var(--text-muted-navy);
  }

  .report-item-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(27,94,168,0.14);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .btn-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--cobalt);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 15px 32px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: var(--transition);
    text-decoration: none;
  }

  .btn-cta:hover { background: var(--cobalt-dark); }

  /* ── Loading ── */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(27,94,168,0.2);
    border-top-color: var(--cobalt);
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 24px;
    text-align: left;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
  }

  .loading-step {
    font-size: 13px;
    color: var(--text-muted-navy);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .loading-step.visible { opacity: 1; }
  .loading-step.done { color: #16A34A; }

  .loading-step-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* ── Error ── */
  .field-error {
    font-size: 12px;
    color: #f87171;
    margin-top: 6px;
  }

  .input-error { border-color: rgba(220,38,38,0.5) !important; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-enter { animation: fadeUp 0.35s ease forwards; }

  /* ── Footer ── */
  .site-footer {
    text-align: center;
    padding: 32px 0 0;
    font-size: 12px;
    color: rgba(232,238,245,0.5);
    background: var(--cobalt);
    border-top: 1px solid var(--border);
    margin-top: 60px;
  }
</style>
</head>
<body>
<div class="shell">
  <header class="site-header">
    <div class="logo">G<span>S</span><span style="color:#D63B2F">D</span></div>
    <div class="header-tag">Free Assessment</div>
  </header>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-meta">
      <span id="stepLabel">Step 1 of 5</span>
      <strong id="stepName">Your Organization</strong>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="step-dots" id="stepDots"></div>
  </div>

  <main id="mainContent"></main>

  <footer class="site-footer">
    © 2025 GSD &nbsp;·&nbsp; Your data is confidential and used solely to prepare your assessment.
  </footer>
</div>

<script>
const STEPS = [
  { id: 'intro',     label: 'Start',             name: 'Intro' },
  { id: 'company',   label: 'Step 1 of 5',       name: 'Your Organization' },
  { id: 'structure', label: 'Step 2 of 5',       name: 'Org Structure' },
  { id: 'process',   label: 'Step 3 of 5',       name: 'Process Health' },
  { id: 'pain',      label: 'Step 4 of 5',       name: 'Challenges & Goals' },
  { id: 'analyzing', label: 'Step 5 of 5',       name: 'Analyzing…' },
  { id: 'teaser',    label: 'Your Results',       name: 'Results Preview' },
  { id: 'gate',      label: 'Unlock Report',     name: 'Get Full Report' },
  { id: 'done',      label: 'Done',              name: 'Report Sent' },
];

const data = {};
let current = 0;

const main = document.getElementById('mainContent');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const stepLabel    = document.getElementById('stepLabel');
const stepName     = document.getElementById('stepName');
const stepDots     = document.getElementById('stepDots');

const DIAGNOSTIC_STEPS = ['company','structure','process','pain'];

function updateProgress() {
  const s = STEPS[current];
  const diagIdx = DIAGNOSTIC_STEPS.indexOf(s.id);
  const showProgress = diagIdx >= 0 || ['analyzing','teaser','gate','done'].includes(s.id);
  progressWrap.style.display = showProgress ? '' : 'none';

  const total = DIAGNOSTIC_STEPS.length + 1;
  const filled = diagIdx >= 0 ? ((diagIdx + 1) / total) * 100
               : ['analyzing','teaser','gate','done'].includes(s.id) ? 100 : 0;

  progressFill.style.width = filled + '%';
  stepLabel.textContent = s.label;
  stepName.textContent  = s.name;

  stepDots.innerHTML = '';
  DIAGNOSTIC_STEPS.forEach((sid, i) => {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i < diagIdx ? ' done' : i === diagIdx ? ' active' : '');
    stepDots.appendChild(d);
  });
}

function go(stepId) {
  current = STEPS.findIndex(s => s.id === stepId);
  updateProgress();
  const fn = renders[stepId];
  if (fn) {
    main.innerHTML = '';
    const el = fn();
    el.classList.add('step-enter');
    main.appendChild(el);
  }
}

/* ─── INTRO ─── */
const renders = {

intro() {
  const d = div();
  d.innerHTML = `
    <div style="padding: 20px 0 10px;">
      <div class="section-eyebrow">GSD Advisory</div>
      <h1 class="section-title" style="font-size:40px;margin-bottom:16px;">
        Is your organization<br><em>built for efficiency?</em>
      </h1>
      <p style="color:var(--text-muted-navy);font-size:16px;max-width:520px;line-height:1.7;margin-bottom:36px;">
        This 5-minute diagnostic benchmarks your org structure, cost base, and core processes against industry leaders — and pinpoints exactly where you're leaving efficiency on the table.
      </p>
      <div style="display:grid;gap:12px;margin-bottom:36px;max-width:480px;">
        ${['Org structure & spans of control analysis','Process efficiency benchmark (RTR, PTP, OTC, HR, IT)','Cost structure and headcount concentration review','Personalized opportunity roadmap'].map(t => `
          <div style="display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text-muted-navy);">
            <div style="width:20px;height:20px;border-radius:50%;background:rgba(27,94,168,0.15);border:1px solid rgba(27,94,168,0.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg viewBox="0 0 12 12" width="10" height="10" fill="none"><polyline points="2,6 5,9 10,3" stroke="#2470C4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            ${t}
          </div>`).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
        <button class="btn-next" id="startBtn" style="font-size:15px;padding:15px 32px;">
          Start Free Assessment
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span style="font-size:13px;color:var(--text-muted-navy);">~5 minutes &nbsp;·&nbsp; No credit card</span>
      </div>
    </div>`;
  d.querySelector('#startBtn').onclick = () => go('company');
  return d;
},

        <div class="loading-step" id="ls4"><div class="loading-step-dot"></div>Scoring automation & co-source opportunities</div>
        <div class="loading-step" id="ls5"><div class="loading-step-dot"></div>Preparing your efficiency scorecard</div>
      </div>
    </div>`;

  let idx = 0;
  const steps = [1,2,3,4,5].map(i => d.querySelector('#ls'+i));
  const show = () => {
    if (idx < steps.length) {
      steps[idx].classList.add('visible');
      if (idx > 0) steps[idx-1].classList.add('done');
      idx++;
      setTimeout(show, 900);
    } else {
      runAnalysis().then(() => go('teaser'));
    }
  };
  setTimeout(show, 400);
  return d;
},

  const insights = window._insights || [

      </a>
    </div>`;

  // Set mailto href after innerHTML is set (can't use <script> inside template literals)
  const schedCta = d.querySelector('#schedule-cta');
  if (schedCta) {
    const subject = encodeURIComponent('Following up \u2014 ' + (data.companyName||'') + ' Efficiency Assessment');

    schedCta.href = 'mailto:bstevens@gsdsol.com?subject=' + subject + '&body=' + body;
  }
  return d;
},

/* ─── Helpers ─── */
function div() {
  const el = document.createElement('div');
  return el;
}

function choiceCard(label, name, checked=false, multi=false, desc='') {
  const type = multi ? 'checkbox' : 'radio';
  return `
    <label class="choice-card${multi?' checkbox':''}">
      <input type="${type}" name="${name}" value="${label}" ${checked?'checked':''}>
      <div class="choice-card-inner">
        <div class="choice-marker"><div class="choice-marker-dot"></div></div>
        <div class="choice-text">
          <div class="choice-title">${label}</div>
          ${desc ? `<div class="choice-desc">${desc}</div>` : ''}
        </div>
      </div>
    </label>`;
}

function wireChoices(container) {
  container.querySelectorAll('.choice-card input').forEach(inp => {
    inp.addEventListener('change', () => {
      if (inp.type === 'radio') {
        container.querySelectorAll(`input[name="${inp.name}"]`).forEach(r => {
          r.closest('.choice-card').querySelector('.choice-card-inner').style.borderColor = '';
        });
      }
    });
  });
}

function collectChoices(container) {
  const radios = {};
  const checkboxes = {};
  container.querySelectorAll('.choice-card input').forEach(inp => {
    if (inp.type === 'radio' && inp.checked) radios[inp.name] = inp.value;
    if (inp.type === 'checkbox' && inp.checked) {
      if (!checkboxes[inp.name]) checkboxes[inp.name] = [];
      checkboxes[inp.name].push(inp.value);
    }
  });
  Object.assign(data, radios, checkboxes);
}

/* ─── AI Analysis ─── */
async function runAnalysis() {
  const prompt = `You are an organizational efficiency expert at GSD Advisory. Analyze this company's diagnostic data and return ONLY valid JSON.

Company: ${data.companyName}, ${data.industry}, ${data.headcount} employees, ${data.revenue} revenue
Org model: ${data.orgModel||'Unknown'}, Layers: ${data.layers||'Unknown'}, Span: ${data.span||'Unknown'}
Shared functions: ${(data.shared||[]).join(', ')||'None specified'}
Process maturity — RTR: ${data.rtr||'?'}, PTP: ${data.ptp||'?'}, OTC: ${data.otc||'?'}, HR: ${data.hr||'?'}, IT: ${data.it||'?'}
Close cycle: ${data.closeTime||'Unknown'}, Automation: ${data.automationPct||20}%
Challenges: ${(data.challenges||[]).join(', ')||'Not specified'}
Primary goal: ${data.primaryGoal||'Not specified'}
Budget: ${data.budget||'Unknown'}, Timeline: ${data.timeline||'Unknown'}

Return ONLY this JSON (no markdown, no backticks):
{
  "score": <integer 0-100 reflecting overall efficiency maturity>,
  "insights": [
    {"icon": "<single emoji>", "title": "<short title>", "body": "<2 sentence insight specific to their data>"},
    {"icon": "<single emoji>", "title": "<short title>", "body": "<2 sentence insight specific to their data>"},
    {"icon": "<single emoji>", "title": "<short title>", "body": "<2 sentence insight specific to their data>"}
  ]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const json = await res.json();
    const text = json.content?.[0]?.text || '';
    const parsed = JSON.parse(text);
    window._score = parsed.score;
    window._insights = parsed.insights;
  } catch(e) {
    window._score = 58;
    window._insights = [
      {icon:'🏗️', title:'Org structure opportunity', body:`For a ${data.headcount||'mid-size'} organization in ${data.industry||'your industry'}, we've identified structural patterns worth reviewing — particularly around spans of control and reporting layers.`},
      {icon:'⚙️', title:'Process automation gap', body:`At ${data.automationPct||20}% automation, there is meaningful opportunity to reduce manual effort in finance operations and accelerate your close cycle.`},
      {icon:'💡', title:'Co-sourcing potential', body:`Your process maturity profile and organizational model suggest 2–3 functions are well-suited for a shared services or co-sourcing arrangement.`},
    ];
  }
}
